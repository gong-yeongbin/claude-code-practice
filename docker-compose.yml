services:
  postgres:
    image: postgres:16-alpine
    container_name: co-approval-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coapproval
      POSTGRES_PASSWORD: coapproval_secret
      POSTGRES_DB: co_approval
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
